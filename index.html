<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daphne van der Zee — Visual Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Instrument Serif',serif;-webkit-font-smoothing:antialiased;background:#0a0a0a;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ══════════════════════════════════════
   PATIENCE INTRO
   ══════════════════════════════════════ */
.patience{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:#0a0a0a;transition:opacity .8s ease}
.patience.gone{opacity:0;pointer-events:none}
.patience__text{font-family:'Instrument Serif',serif;font-size:clamp(16px,2vw,22px);font-style:italic;color:rgba(255,255,255,0);transition:color 1.2s ease;letter-spacing:.02em}
.patience__text.show{color:rgba(255,255,255,.35)}

/* ══════════════════════════════════════
   WELCOME BACK (returning visitors)
   ══════════════════════════════════════ */
.welcome-back{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Caveat',cursive;font-size:18px;color:rgba(255,255,255,.3);z-index:90;opacity:0;transition:opacity 1s;pointer-events:none}
.welcome-back.show{opacity:1}

/* ══════════════════════════════════════
   THREAD
   ══════════════════════════════════════ */
.thread{position:fixed;top:0;left:0;width:3px;height:0%;background:linear-gradient(180deg,#722F37,#5C1A23);z-index:150;border-radius:0 0 2px 0}

/* ══════════════════════════════════════
   PAGE FLIP
   ══════════════════════════════════════ */
.flip-container{width:100%;min-height:100vh;perspective:2000px}
.flip-inner{position:relative;width:100%;transition:transform .8s cubic-bezier(.16,1,.3,1);transform-style:preserve-3d}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{width:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.flip-back{position:absolute;top:0;left:0;transform:rotateY(180deg);min-height:100vh;background:#0a0a0a;display:flex;align-items:center;justify-content:center}

/* ══════════════════════════════════════
   NAV
   ══════════════════════════════════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:28px 36px;pointer-events:none}
.nav a{pointer-events:auto;font-size:15px;font-weight:400;letter-spacing:.02em;transition:opacity .3s;color:#fff}
.nav a:hover{opacity:.6}
.nav__center{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:.02em}

/* ══════════════════════════════════════
   GRID
   ══════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(3,1fr);width:100%}

/* ══════════════════════════════════════
   TILES
   ══════════════════════════════════════ */
.tile{position:relative;aspect-ratio:4/5;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(60px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.tile.reveal{opacity:1;transform:translateY(0)}
.tile:nth-child(1){transition-delay:0s}
.tile:nth-child(2){transition-delay:.12s}
.tile:nth-child(3){transition-delay:.24s}

/* 11. MOUSE SPEED REACTION — tilt on fast movement */
.tile{transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.tile.reveal{transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .15s ease-out}

/* Color tiles — living gradients */
.tile--color{display:flex;align-items:center;justify-content:center;background-size:200% 200%;animation:gradientShift 8s ease infinite}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.tile--color::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E");opacity:.5;pointer-events:none;mix-blend-mode:overlay}

.tile__name{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,2.5vw,32px);font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.7);transition:all .4s;position:relative;z-index:1}
.tile:hover .tile__name{letter-spacing:.35em;color:#fff}

/* Media */
.tile__media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:all .6s cubic-bezier(.16,1,.3,1);transform:scale(1)}
.tile:hover .tile__media{transform:scale(1.04)}
.tile__video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:all .6s cubic-bezier(.16,1,.3,1);transform:scale(1)}
.tile:hover .tile__video{transform:scale(1.04)}

/* Hover overlay */
.tile__hover{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .4s;display:flex;flex-direction:column;justify-content:flex-end;padding:28px}
.tile:hover .tile__hover{background:rgba(0,0,0,.4)}
.tile__cat{font-family:'Instrument Serif',serif;font-size:12px;font-style:italic;letter-spacing:.04em;color:rgba(255,255,255,0);margin-bottom:4px;transform:translateY(10px);transition:all .4s .05s}
.tile:hover .tile__cat{color:rgba(255,255,255,.6);transform:translateY(0)}
.tile__title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,2vw,28px);font-weight:600;color:rgba(255,255,255,0);transform:translateY(10px);transition:all .4s .1s}
.tile:hover .tile__title{color:#fff;transform:translateY(0)}

/* Play icon */
.tile__play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .4s .1s;pointer-events:none}
.tile:hover .tile__play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.tile__play svg{width:18px;height:18px;fill:#fff;margin-left:3px}

/* Corner label */
.tile__corner{position:absolute;bottom:28px;right:28px;font-family:'Instrument Serif',serif;font-size:12px;font-style:italic;color:rgba(255,255,255,.2);transition:color .3s;z-index:1}
.tile:hover .tile__corner{color:rgba(255,255,255,.5)}

/* ══════════════════════════════════════
   EXPANDING LIGHTBOX
   ══════════════════════════════════════ */
.expand-lb{position:fixed;inset:0;z-index:200;display:none;background:rgba(0,0,0,0);transition:background .4s}
.expand-lb.open{display:block;background:rgba(0,0,0,.95)}
.expand-lb__content{position:absolute;border-radius:4px;overflow:hidden;transition:all .6s cubic-bezier(.16,1,.3,1)}
.expand-lb__content.expanded{top:2.5vh!important;left:2.5vw!important;width:95vw!important;height:95vh!important;border-radius:8px}
.expand-lb__content video,.expand-lb__content img{width:100%;height:100%;object-fit:cover;transition:object-fit .4s}
.expand-lb__content.expanded video,.expand-lb__content.expanded img{object-fit:contain}
.expand-lb__close{position:fixed;top:24px;right:28px;z-index:210;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .2s}
.expand-lb.open .expand-lb__close{display:flex}
.expand-lb__close:hover{background:rgba(255,255,255,.15)}
.expand-lb__close svg{width:16px;height:16px;stroke:#fff;stroke-width:2.5}
.expand-lb__info{position:absolute;bottom:24px;left:28px;z-index:2;opacity:0;transform:translateY(10px);transition:all .4s .4s}
.expand-lb.open .expand-lb__info{opacity:1;transform:translateY(0)}
.expand-lb__info-cat{font-family:'Instrument Serif',serif;font-size:12px;font-style:italic;color:rgba(255,255,255,.5);margin-bottom:4px}
.expand-lb__info-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:#fff}

/* ══════════════════════════════════════
   THE BREATH
   ══════════════════════════════════════ */
.breath{background:#fff;padding:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.breath__inner{text-align:center;padding:80px 40px}
.breath__quote{font-family:'Caveat',cursive;font-size:clamp(24px,3.5vw,38px);color:#1A1A1A;line-height:1.6;letter-spacing:.01em;opacity:0;transform:translateY(20px);transition:all 1.2s cubic-bezier(.16,1,.3,1)}
.breath__quote.show{opacity:1;transform:translateY(0)}
.footer--light{background:#fff;color:rgba(26,26,26,.15);padding:20px 36px;display:flex;justify-content:space-between;font-size:11px}

/* ══════════════════════════════════════
   ABOUT — BACK OF PAGE
   ══════════════════════════════════════ */
.about-back{width:100%;min-height:100vh;padding:80px 60px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.about-back__close{position:fixed;top:28px;right:36px;font-family:'Instrument Serif',serif;font-size:15px;color:#fff;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.about-back__close.show{opacity:1;pointer-events:auto}
.about-back h2{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,64px);font-weight:600;color:#fff;letter-spacing:-.02em;margin-bottom:32px;cursor:pointer;transition:opacity .3s}
.about-back h2:hover{opacity:.6}
.about-back__line{width:48px;height:3px;background:#722F37;margin:0 auto 40px}
.about-back__typed{font-family:'Instrument Serif',serif;font-size:clamp(16px,1.5vw,20px);line-height:1.8;color:rgba(255,255,255,.5);max-width:600px;min-height:160px;font-style:italic;text-align:center}
.about-back__typed .typo{text-decoration:line-through;color:rgba(255,255,255,.2);margin-right:4px}
.about-back__cursor{display:inline-block;width:2px;height:1.1em;background:#722F37;vertical-align:text-bottom;animation:blink .8s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.about-back__skills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:32px;opacity:0;transition:opacity 1s}
.about-back__skills.show{opacity:1}
.about-back__skill{padding:8px 18px;font-family:'Instrument Serif',serif;font-size:13px;font-style:italic;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08);border-radius:3px;transition:all .2s}
.about-back__skill:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}

/* ══════════════════════════════════════
   FOOTER
   ══════════════════════════════════════ */
.footer{padding:20px 36px;display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.2);background:#0a0a0a}

/* ══════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════ */
@media(max-width:900px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .nav{padding:20px 24px}
  .about-back{padding:60px 24px}
  .brief__paper{padding:40px 32px}
  .brief{padding:60px 20px}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr}
  .tile{aspect-ratio:3/4}
  .nav__center{font-size:18px}
  .brief__paper{padding:32px 24px;transform:rotate(0)}
}
</style>
</head>
<body>

<!-- ══ PATIENCE INTRO ══ -->
<div class="patience" id="patience">
  <span class="patience__text" id="patienceText">geduld is ook een vorm van design.</span>
</div>

<!-- WELCOME BACK -->
<div class="welcome-back" id="welcomeBack"></div>

<!-- THREAD -->
<div class="thread" id="thread"></div>

<!-- PAGE FLIP -->
<div class="flip-container">
<div class="flip-inner" id="flipInner">

<!-- ══ FRONT: PORTFOLIO ══ -->
<div class="flip-front">

<!-- NAV -->
<nav class="nav" id="mainNav" style="opacity:0;transition:opacity .6s">
  <a href="javascript:void(0)" class="nav__center" onclick="flipToAbout()">daphne van der zee</a>
  <a href="mailto:daphne.zee@live.nl">daphne.zee@live.nl</a>
</nav>

<!-- GRID ROW 1 -->
<section class="grid" id="gridRow1"></section>

<!-- GRID ROW 2 -->
<section class="grid" id="gridRow2"></section>

<!-- GRID ROW 3 -->
<section class="grid" id="gridRow3"></section>

<footer class="footer">
  <span>© 2026 Daphne van der Zee</span>
  <span>daphnevanderzee.nl</span>
</footer>

</div><!-- /flip-front -->

<!-- ══ BACK: ABOUT ══ -->
<div class="flip-back">
<div class="about-back">

  <div class="about-back__skills" id="aboutSkills">
    <span class="about-back__skill">Branding</span>

    <span class="about-back__skill">Shopify</span>

    <span class="about-back__skill">Adobe CC</span>
    <span class="about-back__skill">Animation</span>
    <span class="about-back__skill">Motion Design</span>
    <span class="about-back__skill">Art Direction</span>

</div>
</div>

</div></div>

<!-- EXPANDING LIGHTBOX -->
<div class="expand-lb" id="elb">
  <button class="expand-lb__close" onclick="closeExpand()">
    <svg viewBox="0 0 24 24" fill="none"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
  </button>
  <div class="expand-lb__content" id="elbContent"></div>
  <div class="expand-lb__info" id="elbInfo"></div>
</div>

<script>
/* ══════════════════════════════════════
   VOOR= PARAMETER SYSTEM
   ══════════════════════════════════════ */
var params=new URLSearchParams(window.location.search);
var voorWie=params.get('voor');

/* ══════════════════════════════════════
   PROJECT DATA
   ══════════════════════════════════════ */

/* Speciale projecten per bedrijf */
var specials={
  defensie:{type:'color',bg:'linear-gradient(135deg,#0C1B2A,#1B3A5C,#0C1B2A)',name:'Defensie',corner:'Wat ik voor jullie zou maken',size:'tile--4x2',
    lbType:'scroll',
    lbTitle:'Visual Designer Innovatie',
    lbCat:'Speculatief werk voor Defensie',
    slides:[
      {title:'Innovatie bij DOSCO',sub:'Van idee tot implementatie — infographic die het innovatieproces visueel maakt voor 75.000 medewerkers.',img:'images/defensie1.jpg'},
      {title:'Innovatie heeft een gezicht',sub:'Social media campagne — LinkedIn en Instagram templates die Defensie-innovaties zichtbaar maken.',img:'images/defensie2.jpg'},
      {title:'60 seconden innovatie',sub:'Animatie concept — korte motion graphic die het innovatieteam introduceert aan de hele organisatie.',img:'images/defensie3.jpg'},
      {title:'Kwartaalrapportage Q2 2026',sub:'Presentatie design — data visualisatie en visuele storytelling voor interne communicatie.',img:'images/defensie4.jpg'},
    ]
  }
};

var allProjects=[
  /* VAKJE 1 — kleurvlak burgundy — klik opent vakje1.jpg */
  {type:'color',bg:'linear-gradient(135deg,#2D0A0E,#722F37,#4A1520)',name:'Minibiebreclame',corner:'Brand Identity',lbType:'image',lbSrc:'images/vakje1.jpg',lbCat:'Brand Identity · Web Design',lbTitle:'Minibiebreclame'},

  /* VAKJE 2 — video tegel — zet vakje2.mp4 in videos map + vakje2-poster.jpg in images map */
  {type:'video',poster:'images/vakje2-poster.jpg',src:'videos/vakje2.mp4',cat:'Web Design · Shopify',title:'MBR Website',lbType:'video',lbSrc:'videos/vakje2.mp4',lbCat:'Web Design · Shopify',lbTitle:'MBR Website'},

  /* VAKJE 3 — foto tegel — zet vakje3.jpg in images map */
  {type:'image',src:'images/vakje3.jpg',cat:'Brand Strategy',title:'Winkeluitstraling',lbType:'image',lbSrc:'images/vakje3.jpg',lbCat:'Brand Strategy',lbTitle:'Winkeluitstraling'},

  /* VAKJE 4 — foto tegel — zet vakje4.jpg in images map */
  {type:'image',src:'images/vakje4.jpg',cat:'Product Design',title:'Viva La Bieb',lbType:'image',lbSrc:'images/vakje4.jpg',lbCat:'Product Design',lbTitle:'Viva La Bieb'},

  /* VAKJE 5 — kleurvlak groen — klik opent vakje5.jpg */
  {type:'color',bg:'linear-gradient(135deg,#1a2e1a,#2D4A2D,#1a2e1a)',name:'Herman',corner:'Animation',lbType:'image',lbSrc:'images/vakje5.jpg',lbCat:'Animation · Art Direction',lbTitle:"Herman's Journey"},

  /* VAKJE 6 — video tegel — zet vakje6.mp4 in videos map + vakje6-poster.jpg in images map */
  {type:'video',poster:'images/vakje6-poster.jpg',src:'videos/vakje6.mp4',cat:'Content Design',title:'Social Templates',lbType:'video',lbSrc:'videos/vakje6.mp4',lbCat:'Content Design',lbTitle:'Social Templates'},

  /* VAKJE 7 — video tegel — zet vakje7.mp4 in videos map + vakje7-poster.jpg in images map */
  {type:'video',poster:'images/vakje7-poster.jpg',src:'videos/vakje7.mp4',cat:'Art Direction',title:'Photography',lbType:'video',lbSrc:'videos/vakje7.mp4',lbCat:'Art Direction',lbTitle:'Photography'},

  /* VAKJE 8 — foto tegel — zet vakje8.jpg in images map */
  {type:'image',src:'images/vakje8.jpg',cat:'Visual Identity',title:'Logo & Branding',lbType:'image',lbSrc:'images/vakje8.jpg',lbCat:'Visual Identity',lbTitle:'Logo & Branding'},

  /* VAKJE 9 — kleurvlak bruin — klik opent vakje9.jpg */
  {type:'color',bg:'linear-gradient(135deg,#3D2B1F,#6B4226,#4A3228)',name:'Kabouter Route',corner:'Concept Design',lbType:'image',lbSrc:'images/vakje9.jpg',lbCat:'Concept Design',lbTitle:'Gouden Kabouter Route'},
];

/* Als ?voor= parameter aanwezig is, voeg speciaal project toe als eerste */
if(voorWie && specials[voorWie.toLowerCase()]){
  allProjects.unshift(specials[voorWie.toLowerCase()]);
  allProjects.pop(); /* houd het op 9 tegels */
}

/* Dynamic patience text */
var patienceMsg='geduld is ook een vorm van design.';
if(voorWie){
  patienceMsg='Dit is voor jou, '+voorWie.charAt(0).toUpperCase()+voorWie.slice(1)+'.';
}
document.getElementById('patienceText').textContent=patienceMsg;

/* ══ 7. RANDOM ORDER ══ */
/* No shuffle — fixed order, you control the story */
var shuffled=allProjects;

function buildTile(p,idx){
  var div=document.createElement('div');
  var extraClass=p.size?' '+p.size:'';
  div.className='tile'+(p.type==='color'?' tile--color':'')+extraClass;
  if(p.type==='color')div.style.background=p.bg;
  div.setAttribute('data-idx',idx);
  div.onclick=function(){expandTile(this,idx)};

  if(p.type==='color'){
    div.innerHTML='<span class="tile__name">'+p.name+'</span><span class="tile__corner">'+p.corner+'</span>';
  }else if(p.type==='video'){
    div.innerHTML='<video class="tile__video" muted loop playsinline preload="metadata" poster="'+p.poster+'"><source src="'+p.src+'" type="video/mp4"></video><div class="tile__hover"><span class="tile__cat">'+p.cat+'</span><span class="tile__title">'+p.title+'</span></div><div class="tile__play"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div>';
  }else{
    div.innerHTML='<img class="tile__media" src="'+p.src+'" alt="" loading="lazy"><div class="tile__hover"><span class="tile__cat">'+p.cat+'</span><span class="tile__title">'+p.title+'</span></div>';
  }
  return div;
}

function renderGrid(){
  var rows=[document.getElementById('gridRow1'),document.getElementById('gridRow2'),document.getElementById('gridRow3')];
  rows.forEach(function(r){r.innerHTML=''});
  shuffled.forEach(function(p,i){
    var row=rows[Math.floor(i/3)];
    if(row)row.appendChild(buildTile(p,i));
  });
  // Re-attach video hover
  document.querySelectorAll('.tile').forEach(function(tile){
    var v=tile.querySelector('video');
    if(!v)return;
    tile.addEventListener('mouseenter',function(){v.play().catch(function(){})});
    tile.addEventListener('mouseleave',function(){v.pause();v.currentTime=0});
  });
  // Re-observe for scroll reveal
  document.querySelectorAll('.tile').forEach(function(t){revealObs.observe(t)});
}

/* ══ SCROLL REVEAL ══ */
var revealObs=new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){entry.target.classList.add('reveal');revealObs.unobserve(entry.target)}
  });
},{threshold:0.08,rootMargin:'0px 0px -40px 0px'});

/* ══ THREAD ══ */
var thread=document.getElementById('thread');
window.addEventListener('scroll',function(){
  var h=document.documentElement.scrollHeight-window.innerHeight;
  var pct=h>0?(window.scrollY/h)*100:0;
  thread.style.height=pct+'%';
},{passive:true});

/* ══ 11. MOUSE SPEED TILT ══ */
var lastX=0,lastY=0,lastTime=Date.now();
document.addEventListener('mousemove',function(e){
  var now=Date.now();
  var dt=now-lastTime;
  if(dt<16)return;
  var dx=e.clientX-lastX;
  var dy=e.clientY-lastY;
  var speed=Math.sqrt(dx*dx+dy*dy)/dt;
  lastX=e.clientX;lastY=e.clientY;lastTime=now;

  if(speed>1.5){
    document.querySelectorAll('.tile.reveal').forEach(function(tile){
      var rect=tile.getBoundingClientRect();
      var cx=rect.left+rect.width/2;
      var cy=rect.top+rect.height/2;
      var dist=Math.sqrt(Math.pow(e.clientX-cx,2)+Math.pow(e.clientY-cy,2));
      if(dist<400){
        var force=Math.min(speed*0.8,6);
        var angle=Math.atan2(e.clientY-cy,e.clientX-cx);
        var tiltX=Math.cos(angle)*force*-0.5;
        var tiltY=Math.sin(angle)*force*-0.3;
        tile.style.transform='perspective(800px) rotateY('+tiltX+'deg) rotateX('+tiltY+'deg)';
        clearTimeout(tile._resetTilt);
        tile._resetTilt=setTimeout(function(){tile.style.transform=''},300);
      }
    });
  }
});

/* ══ 9. TYPE EFFECT WITH CORRECTIONS ══ */
var typed=false;
var typeTarget=document.getElementById('typedText');
var typeSequence=[
  {text:'Senior designer met ',delay:30},
  {text:'10',delay:80},
  {typo:true,count:2,delay:60},
  {text:'6+ jaar ervaring in branding, UI/UX en visuele communicatie.',delay:25},
  {pause:400},
  {text:' Ik combineer ',delay:25},
  {text:'schoonheid',delay:40},
  {typo:true,count:10,delay:40},
  {text:'strategie met esthetiek',delay:25},
  {text:' — van merkidentiteit tot digitale producten.',delay:25},
  {pause:600},
  {text:'\n\nExpertise in Adobe Creative Suite, Shopify, WordPress, animatie en motion design.',delay:20},
  {pause:300},
  {text:' Ik ontwerp niet alleen hoe iets eruitziet — ik ontwerp hoe iets ',delay:22},
  {text:'voelt',delay:60},
  {typo:true,count:5,delay:50},
  {text:'werkt.',delay:30},
];

function startTyping(){
  if(typed)return;
  typed=true;
  typeTarget.innerHTML='<span class="about-back__cursor"></span>';
  var fullText='';
  var seqIdx=0;
  var charIdx=0;

  function processNext(){
    if(seqIdx>=typeSequence.length){
      // Done — remove cursor, show skills
      setTimeout(function(){
        typeTarget.innerHTML=fullText.replace(/\n/g,'<br>');
        document.getElementById('aboutSkills').classList.add('show');
      },500);
      return;
    }
    var step=typeSequence[seqIdx];

    if(step.pause){
      seqIdx++;
      setTimeout(processNext,step.pause);
    }else if(step.typo){
      // Backspace effect
      var count=step.count;
      var delInterval=setInterval(function(){
        fullText=fullText.slice(0,-1);
        typeTarget.innerHTML=fullText.replace(/\n/g,'<br>')+'<span class="about-back__cursor"></span>';
        count--;
        if(count<=0){clearInterval(delInterval);seqIdx++;setTimeout(processNext,200)}
      },step.delay);
    }else{
      // Type text
      var txt=step.text;
      charIdx=0;
      var typeInterval=setInterval(function(){
        fullText+=txt[charIdx];
        typeTarget.innerHTML=fullText.replace(/\n/g,'<br>')+'<span class="about-back__cursor"></span>';
        charIdx++;
        if(charIdx>=txt.length){clearInterval(typeInterval);seqIdx++;setTimeout(processNext,80)}
      },step.delay);
    }
  }
  processNext();
}

/* ══ BREATH REVEAL ══ */
var breathObs=new IntersectionObserver(function(entries){
  entries.forEach(function(entry){
    if(entry.isIntersecting){
      var q=entry.target.querySelector('.breath__quote');
      if(q)q.classList.add('show');
      breathObs.unobserve(entry.target);
    }
  });
},{threshold:0.3});
var breathEl=document.querySelector('.breath');
if(breathEl)breathObs.observe(breathEl);
</script>
